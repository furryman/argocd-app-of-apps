# Phase 5: ArgoCD UI lives at https://argocd.fuhriman.org via the shared
# public Gateway. ArgoCD server runs with --insecure (set via the chart's
# configs.params.server.insecure=true in user_data.sh); TLS terminates at
# the Gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  parentRefs:
    - name: public
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - argocd.fuhriman.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
